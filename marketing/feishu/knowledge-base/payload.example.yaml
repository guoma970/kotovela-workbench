    name: Preview-only example
    method: POST
    url: https://example.invalid/open-apis/wiki/v2/spaces/{space_id}/nodes
    headers:
      Authorization: Bearer ${EXAMPLE_TOKEN_ONLY}
    body:
      parent_node_token: wiki_example_parent
      node_type: origin
      obj_type: docx
      origin_content:
        title: Example knowledge-base page
