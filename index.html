<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="description" content="OpenClaw workbench" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OpenClaw workbench" />
    <link rel="manifest" href="/manifest.demo.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>OpenClaw workbench</title>
    <script>
      const appMode = '%VITE_APP_MODE%' === 'internal' ? 'internal' : 'opensource'
      const brandName = appMode === 'internal' ? 'Kotovela Hub' : 'OpenClaw × KOTOVELA'
      const brandDescription =
        appMode === 'internal' ? 'Kotovela Hub · 内部多实例协作驾驶舱' : 'OpenClaw × KOTOVELA · 开源多实例协作演示（Mock）'
      document.title = brandName
      document
        .querySelector('meta[name="description"]')
        ?.setAttribute('content', brandDescription)
      document
        .querySelector('meta[name="apple-mobile-web-app-title"]')
        ?.setAttribute('content', brandName)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
