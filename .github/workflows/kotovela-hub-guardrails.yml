name: Kotovela Hub Guardrails

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  enforce-public-example-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce public example-only assets
        run: bash scripts/guard_public_kotovela_hub.sh
