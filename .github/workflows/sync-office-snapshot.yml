name: Sync Office Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: office-snapshot-sync
  cancel-in-progress: false

jobs:
  sync-office-snapshot:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify OpenClaw is available
        run: openclaw --version

      - name: Install dependencies
        run: npm ci

      - name: Export latest office snapshot
        run: npm run sync:office-snapshot

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- data/office-instances.snapshot.json; then
            echo "No snapshot changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/office-instances.snapshot.json
          git commit -m "chore: sync office snapshot"
          git push origin HEAD:main
